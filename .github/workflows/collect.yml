name: Collect video data and recompute forecast

on:
  schedule:
    - cron: "0 * * * *" # every hour, UTC
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --locked

      - name: Discover new videos
        run: uv run python collector.py

      - name: Cache missing pokemon icons
        run: uv run python pokemon_images.py

      - name: Take due view-count snapshots
        run: uv run python snapshotter.py

      - name: Recompute forecast
        run: uv run python forecaster.py
