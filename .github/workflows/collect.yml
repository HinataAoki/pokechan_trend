name: Collect video data and recompute forecast

on:
  schedule:
    # Every 2 hours, off the :00 mark (on-the-hour schedules are the most
    # congested slot on GitHub's shared cron and get delayed/dropped).
    - cron: "17 */2 * * *"
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync --locked

      - name: Decide whether to run keyword search this hour
        id: search_gate
        run: |
          hour=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$hour" = "00" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      # Primary discovery path: scraped hashtag pages + date-sorted search
      # results via yt-dlp - zero API quota, so it can run every hour.
      # Details for candidates still come from videos.list (1 unit / 50).
      - name: Discover new videos via scraping (quota-free, hourly)
        run: uv run python scrape_collector.py

      # search.list is quota-expensive (100 units/call) and has different
      # recall than the scraped feeds, so it stays as a once-daily safety
      # net - rss_watcher.py below covers known channels for free, hourly.
      - name: Discover new channels via keyword search (daily)
        if: steps.search_gate.outputs.run == 'true'
        run: uv run python collector.py

      - name: Discover new videos from known channels via RSS (free, hourly)
        run: uv run python rss_watcher.py

      - name: Cache missing pokemon icons
        run: uv run python pokemon_images.py

      - name: Take due view-count snapshots
        run: uv run python snapshotter.py

      - name: Recompute forecast
        run: uv run python forecaster.py

      - name: Bake public JSON snapshot
        run: uv run python export_snapshot.py
